{% extends 'index.html' %}

{% block content %}
<h2 class="mb-4">Listagem de Pessoas</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Ocupação</th>
        </tr>
    </thead>
    <tbody>
        {% for p in pessoas %}
        <tr>
            <td>{{ p.nome }}</td>
            <td>{{ p.cpf }}</td>
            <td>{{ p.ocupacao }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
