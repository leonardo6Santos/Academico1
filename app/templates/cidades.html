{% extends 'index.html' %}
{% block content %}
<h2 class="mb-4">Cidades Cadastradas</h2>
<table class="table table-hover">
    <thead>
        <tr>
            <th>Cidade</th>
            <th>UF</th>
        </tr>
    </thead>
    <tbody>
        {% for cidade in cidades %}
        <tr>
            <td>{{ cidade.nome }}</td>
            <td>{{ cidade.uf }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
